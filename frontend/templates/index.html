<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Smart Support AI</title>

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >
</head>

<body>

    <main class="container">

        <section class="header">
            <div class="logo">🤖</div>

            <h1>Smart Support AI</h1>

            <p>
                Teknik sorununuzu yazın, sistem size uygun çözüm önerisini sunsun.
            </p>
        </section>

        <section class="support-card">

            <form method="POST" id="support-form">

                <label for="question">
                    Teknik sorununuz
                </label>

                <textarea
                    id="question"
                    name="question"
                    placeholder="Örnek: Bilgisayarım Wi-Fi ağına bağlanmıyor."
                    required
                >{{ question }}</textarea>

                <button type="submit" class="solution-button">
                    Çözüm Bul
                </button>

                <div id="loading-box" class="loading-box">
                    <div class="spinner"></div>

                    <p>
                        Sorunuz analiz ediliyor...
                    </p>
                </div>

            </form>

            {% if answer %}

                <div class="answer-box">

                    <div class="answer-title">
                        <span>✅</span>

                        <h2>
                            Önerilen Çözüm
                        </h2>
                    </div>

                    <p>
                        {{ answer }}
                    </p>

                </div>

            {% endif %}

        </section>

        <section class="examples">

            <h2>
                Örnek Sorular
            </h2>

            <p class="example-description">
                Bir soruya tıklayarak soru kutusuna ekleyebilirsiniz.
            </p>

            <div class="example-list">

                <button type="button" class="example-question">
                    Wi-Fi bağlantım kesiliyor
                </button>

                <button type="button" class="example-question">
                    Bilgisayardan ses gelmiyor
                </button>

                <button type="button" class="example-question">
                    Yazıcı çıktı vermiyor
                </button>

                <button type="button" class="example-question">
                    Mikrofonum çalışmıyor
                </button>

            </div>

        </section>

    </main>

    <script>
        const questionBox =
            document.getElementById("question");

        const exampleQuestions =
            document.querySelectorAll(".example-question");

        const supportForm =
            document.getElementById("support-form");

        const loadingBox =
            document.getElementById("loading-box");

        const solutionButton =
            document.querySelector(".solution-button");


        exampleQuestions.forEach(function (button) {
            button.addEventListener("click", function () {
                questionBox.value = button.textContent.trim();
                questionBox.focus();

                window.scrollTo({
                    top: 0,
                    behavior: "smooth"
                });
            });
        });


        supportForm.addEventListener("submit", function (event) {
            event.preventDefault();

            loadingBox.style.display = "flex";
            solutionButton.disabled = true;
            solutionButton.textContent = "Analiz ediliyor...";

            setTimeout(function () {
                supportForm.submit();
            }, 1200);
        });
    </script>

</body>
</html>
